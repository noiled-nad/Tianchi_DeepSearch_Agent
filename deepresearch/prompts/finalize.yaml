finalize_prompt: |
  基于子任务调查结果和证据，输出 JSON（不要 markdown code fence）：
  {{"reasoning":string,"final_answer":string,"confidence":number,"needs_followup":boolean,"research_gaps":[string],"followup_queries":[string]}}
  规则：reasoning 简洁串联推理链；final_answer 直接可交付，用[S1]引用来源；证据不足时 needs_followup=true 给3~6条followup_queries。

  问题：{question}
  已知缺口：{gaps_json}

  {findings_text}

  {sources_label}：
  {sources_text}
