structured_extraction_prompt: |
  你是精准信息提取与推理专家。请根据文档内容和已有推理链条，为当前子任务提取结构化结果。

  原始问题：{question}
  子任务：[{subtask_id}] {subtask_title}
  子任务目标：{subtask_reason}

  {chain_memory}

  文档内容：
  {docs_text}

  请以严格JSON格式输出（不要markdown code fence）：
  {{"reasoning_trace": "在这里写你的完整推理过程：先列出文档中找到了什么线索，再结合前序推理链和子任务目标，一步步推导出答案。如果文档中提到了A，而子任务问的是A的某个关系人B，你必须推理出B是谁并把B作为候选。", "sub_query": "该子任务实际聚焦回答的核心问题（一句话）", "evidence": ["关键证据1 [D编号]", "关键证据2 [D编号]"], "candidates": ["最佳答案", "候选2", "候选3"], "confidence": 0.8, "sources": ["来源url1", "来源url2"]}}

  规则：
  1) 【最重要】reasoning_trace 必须先于 candidates 填写！你需要在这里做深度思考推理：
     - 文档里实际提到了哪些实体和关系？
     - 子任务要的具体是什么？不要停留在文档直接提到的实体上，要顺着关系链条往下推一步
     - 举例：如果子任务问「XX的弟弟是谁」，文档提到了XX的家庭成员信息，你需要推理出弟弟是谁，而非把XX本人当答案
     - 结合前序推理链中已经确认的事实，在当前文档中寻找衔接线索
  2) sub_query 用一句话概括此子任务要回答什么
  3) candidates 列出经过推理后所有符合条件的候选答案，第一个是推理最充分的最佳答案
     - 如果只有一个确定答案，candidates 就只放这一个
     - 如果有 2~5 个都可能，全部列入，按推理强度降序排列
  4) evidence 只列与子任务直接相关的事实，标注来源文档编号 [D1] [D2]
  5) confidence：推理链完整且有明确答案=0.8~1.0，多个候选=0.4~0.7，推测=0.2~0.4，无证据=0~0.2
  6) sources 列出提供关键证据的文档URL
  7) 不要编造任何信息，但务必进行合理推理

subtask_guess_prompt: |
  你是一个内建知识极其丰富的问答助手。针对当前子任务，请在不进行外部搜索的情况下，全凭你的内部知识，直接猜出可能的结果或答案，并给出辅助的证据或回忆线索。
  
  全局问题：{question}
  
  {chain_memory}
  
  当前子任务详情：
  - 标题：{subtask_title}
  - 目的：{subtask_reason}
  
  请结合前序推理链已确认的事实，利用你的内部知识进行推理，给出当前子任务可能的答案。注意：不要简单重复前序答案，而是要基于前序结果往前推进一步。
  
  请以严格的 JSON 格式输出，不要包含 markdown code block 标记（如 ```json 等）：
  {{
    "reasoning": "基于前序链条和我的知识，我的推理过程是...",
    "candidates": ["猜测的实体1", "猜测的实体2"],
    "evidence": ["我倾向这个答案因为...", "相关回忆线索是..."]
  }}

verification_query_gen_prompt: |
  你是验证检索词设计专家。你需要为一个【初筛被判定为可能正确的实体】构建严谨的后置验证检索路径。
  
  【全局参考边界】（仅供理解当前语境，绝不许提取后序考点作为验证词）：{question}
  
  需验证的靶点子任务：{subtask_title}
  
  被质疑的初步候选答案：{candidates}
  
  请为以上每一个候选答案生成以下维度的搜索关键词组合，用于在互联网取证：
  1. 路径分支一【中文维基/百科定位】：查询它的客观百科信息，国内使用百度百科，必须在百科后附加消歧义的身份/领域词，例如："候选实体A 百度百科 领域词/身份"，而不是只写 "候选实体A 百度百科"。
  2. 路径分支二【国际维基定位】：针对相同候选，生成对应的国际维基百科词条查询。示例："候选实体A site:wikipedia.org" 或 "候选实体A wikipedia"（若遇同名消歧义则同上处理）。
  3. 路径分支三【交叉锚点实证】：把这个实体与当前子问题所在的锚点约束元素做同框强检索，验证是否有物理交集。不超过2个关键名词！示例："候选实体A 相关特征/相关其他实体"。

  请严格输出 JSON（勿输出其他解释）：
  {{
    "verify_queries": [
      "候选A 百度百科 消歧义领域词",
      "候选A wikipedia 消歧义领域词",
      "候选A 交叉锚点实证词",
      "候选A 中文名 所属领域（仅外文名需要）",
      "候选B 百度百科 消歧义领域词",
      "候选B wikipedia 消歧义领域词",
      "候选B 交叉锚点实证词"
    ]
  }}

  🚨 极其重要：verify_queries 数组里每一个元素必须是一条独立的纯文本查询字符串！
  ❌ 错误示范：["['候选实体A 百科', '候选实体A wiki']"]  （这是把列表当成了字符串）
  ✅ 正确示范：["候选实体A 百科 领域词", "候选实体A wikipedia 领域词"]

verify_and_filter_prompt: |
  你是一个核验专家。你的任务是通过【百科路径】+【交叉信息路径】新检索回来的信息，来质证上一轮的候选答案到底对不对。
  
  靶点任务：{subtask_title}
  具体限定要求/原题指代要求：{subtask_reason}
  
  候选词：{candidates}
  
  【核验材料】：
  {verify_evidence}
  
  审查基线：
  请对着这份验证材料进行对照，重点看：1）分支一里的百科基础信息，这人的身份/属性和题意对的上不？2）分支二里他和题干要的另外一个约束实体真的有关联吗？
  - 如果材料能对得上，它就是真金不怕火炼的答案，放入 passed_candidates。
  - 【极其重要·同名消歧义】：百科搜索可能命中同名但不同领域的实体（如“实体A（影视角色）”与“实体A（游戏道具）”）。你必须根据靶点任务和限定要求的上下文来判断应该选哪个义项，而不是看到某一义项不匹配就直接全盘否定。
  - 【极其重要·中外文名对齐】：如果候选答案是外文名（如英文、日文），你必须先查找/推理出它的官方中文译名，然后用中文名与题目进行匹配。若“外文名X”与“中文名Y”被证实为同一实体，且Y符合题意，则应保留X与Y。
  - 【极其重要·同义词/别名容忍】：这些候选答案（candidates）中，可能有几个是同一实体在不同语种、地区或版本下的名称（例如“产品英文名”“产品中文名”“产品地区译名”）。如果你验证发现它们互为同义词且均正确，请将它们作为合法答案一起全部保留在 passed_candidates 中（或合并说明）。千万不要因为验证材料主用名称是A，就把作为A别名的B错杀剔除。
  
  必须输出完全吻合的 JSON 结构（严禁包含 markdown 源码栅栏以及回车导致的破坏）：
  {{
    "analysis": "这里用一两句话剖析哪些词通过了，哪些词被这波验证给抓到尾巴了，逻辑怎么对不上的。",
    "passed_candidates": ["只放幸存下来的"],
    "rejected_candidates": ["被打出来的垃圾干扰项"],
    "discard_reason": "如有筛除，精简记录死因，比如：同名但非歌手、或是根本查不到这俩人在一块等客观原因。"
  }}

failure_reflect_prompt: |
  你是专业的搜索策略优化助手。
  当前子任务的信息检索未能取得有效成果，搜索结果为空，或者初步获取的候选信息在验证阶段已被证明是错误的。
  你需要基于上一轮的检索记录分析失败原因，并为下一轮的搜索提供优化策略。

  目标任务与语境：{subtask_title}
  
  【检索回顾档案】
  - 上一轮使用的搜索词：{used_queries}
  - 初步检索到的信息片段（Evidence）：{evidence}
  - 经验证被排除的候选回答：{candidates}
  - 被排除/检索失败的具体原因：{discard_reason}

  核心优化反思点：
  1. 为什么上一轮的搜索词无法精准命中目标？是因为方向偏差、限定词不够准确，还是错误地使用了代词而非具体实体？
  2. 下一轮应该如何重新组合检索词？应该对哪个核心实体进行精确匹配（如加双引号），并辅以哪些强相关的属性名词？
  3. 提供一批全新的、经过优化的“关键词组合”（必须是空格分隔的实体名词，严禁使用问句）。严禁代入未发生的题目前瞻信息。

  请严格按照以下格式返回极简 JSON：
  {{
    "reflection": "一针见血地总结上一轮检索偏航或无结果的根本原因（限制1句话）。",
    "tactic_advice": "为下一轮搜索方向提供明确的纠正指导（例如：放弃单独搜索人名，改为精确匹配“公司名”+“游戏研发年份”，以锁定结果）。",
    "suggested_queries": ["2到3条用于下轮检索的纯实体并列组合搜索词"]
  }}

initial_query_gen_prompt: |
  你是专门为搜索引擎设计 Query 的专家。你的核心目标是生成极其精准、孤立的实体关键词组合，以最大化召回率。切勿给出任何多余解释。
  
  【全局赛题背景】（仅供理解上下文，禁止对后序任务提前搜索）：{question}
  
  【★★当前执行目标★★】必须且只能针对本项目生成 Query！
  当前子任务：[{subtask_id}] {subtask_title}
  子任务目标：{subtask_reason}
  已知前序结果：{dependency_context}
  关键约束：{hard_constraints}
  答案格式：{answer_format}
  题型：{problem_type}

  {retry_context}

  请根据子任务类型，生成最多 5 条适合现代搜索引擎的高质量关键词查询。
  查询分三类：
  - A类（Anchor）：锁定已知信息的实体/年份/文档
  - E类（Evidence）：查询该实体的下属直接关联属性/关系/外延
  - V类（Verify）：用候选实体加特定约束关键词进行二次核查

  ## 当前题型的 Query 设计模板

  {type_specific_templates}

  ## 🚨 搜索引擎 Query 铁律（极其重要，违背即失败）
  1. 【严禁越界透传】你当前只负责解决【当前执行目标】，绝对不允许把《全局赛题背景》里那些不属于当前步骤的概念（如后续的主角名、技能名、其他机构名）提取出来当做查询！只准死死盯住【子任务目标】！一步走不稳步步皆输！
  2. 【坚决纯关键词】必须是用空格分隔的短文本组合。绝不可使用自然语言句子或问句！（严禁使用“是什么”、“谁的”、“相关”、“请问”等无意义助词）。
  3. 【单点孤立原则】大任务已被拆成子任务，【此生成的一条 Query 只能且必须只锁定 1个确定实体 + 1个目标属性】！绝不可在单独一个查询中堆砌多跳逻辑上下文。
  4. 【依赖实体直接替换】必须使用“已知前序结果”中真实提取出来的明确实体（如具体人名、具体作品名），直接当做锚点词！切勿再保留泛化代词。
  5. 【经验闭环破局】如果有“上轮经验反馈”，说明原策略失败。你必须采用完全不同的搜索维度的同义名词或扩大/缩小颗粒度重新组词。

  输出格式（每行一条，A/E/V 标签开头，只输出这几行文本）：
  A: 实体名 特征词
  E: 已确定的单边实体 目标属性名词
  V: 候选答案实体名 约束核验词
  （只输出查询列表，不要输出 Markdown 格式，绝无任何多余文本）

search_result_filter_prompt: |
  你是搜索结果筛选器。你的职责是在抓取网页正文之前，仅基于标题、URL、摘要，删掉明显无关的搜索结果。

  原始问题：{question}
  当前子任务：[{subtask_id}] {subtask_title}
  子任务目标：{subtask_reason}

  候选搜索结果：
  {search_results}

  筛选原则：
  1) 保留与当前任务标题/目标直接相关的结果。
  2) 如果标题一看就是泛站、百科导航页、无关人格测试、影视/游戏人物总表、聚合页、营销页，而不是在回答当前子任务，就删除。

  请输出严格 JSON（不要 markdown code fence）：
  {{
    "keep_indices": [1, 3, 5],
    "dropped_indices": [2, 4],
    "reason": "一句话概括筛选思路"
  }}

  注意：
  - `keep_indices` 和 `dropped_indices` 使用上面候选搜索结果里的编号。
  - 如果不确定，优先删除明显不相关的；不要输出额外解释。