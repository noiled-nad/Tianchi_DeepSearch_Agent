structured_extraction_prompt: |
  你是精准信息提取专家。请根据文档内容，为当前子任务提取结构化结果。

  原始问题：{question}
  子任务：[{subtask_id}] {subtask_title}
  子任务目标：{subtask_reason}
  {deps_context}

  文档内容：
  {docs_text}

  请以严格JSON格式输出（不要markdown code fence）：
  {{"sub_query": "该子任务实际聚焦回答的核心问题（一句话）", "evidence": ["关键证据1 [D编号]", "关键证据2 [D编号]"], "candidates": ["最佳答案", "候选2", "候选3"], "confidence": 0.8, "sources": ["来源url1", "来源url2"]}}

  规则：
  1) sub_query 用一句话概括此子任务要回答什么
  2) candidates 列出文档中所有符合条件的候选答案，第一个是证据最强的最佳答案
     - 如果只有一个确定答案，candidates 就只放这一个
     - 如果有 2~5 个都可能，全部列入，按证据强度降序排列
  3) evidence 只列与子任务直接相关的事实，标注来源文档编号 [D1] [D2]
  4) confidence：有明确唯一答案=0.8~1.0，多个候选=0.4~0.7，推测=0.2~0.4，无证据=0~0.2
  5) sources 列出提供关键证据的文档URL
  6) 不要编造任何信息

rewriter_prompt: |
  你是查询重写专家。根据前序子任务的结构化结果，为当前子任务生成两类搜索查询。

  核心原则：用前序子任务已确认的 **具体答案** 作为锚点，替换泛化描述。
  **多候选处理**：如果前序有多个候选答案（candidates），为每个候选分别生成查询，扩大覆盖面。

  原始问题：{question}
  当前子任务：[{subtask_id}] {subtask_title}
  当前子任务目标：{subtask_reason}

  原始查询：
  {original_queries}

  前序子任务结果：
  {prev_results}

  ## 生成两类查询

  ### P类（Precision 高精度）
  - 用前序答案中的具体实体（人名/数字/日期）作为锚点
  - 加上当前子任务的关系词
  - 如果前序有多个候选，为排名靠前的 2~3 个候选各生成一条 P 查询
  - 每条 2~5 词，极短精准

  ### R类（Recall 高召回）
  - 弱化锚点，只用最核心的实体名
  - 防止 P 类锚点有误导致完全无结果
  - 每条 2~4 词
  - 生成 1~2 条

  ## 铁律
  - 严格使用子任务标题和前序结果中的原文措辞，绝不同义替换、缩写
  - 每条查询只检索一个目标，绝不堆叠多跳信息
  - 只使用前序结果中已确认的事实，不要编造

  输出格式（每行一条，P/R标签开头）：
  P: 候选实体A 关系词
  P: 候选实体B 关系词
  R: 核心实体

  只输出查询列表，不要其他内容。

self_check_prompt: |
  你是研究质量审查员。请评估当前子任务的执行结果是否达标。

  原始问题：{question}
  子任务：[{subtask_id}] {subtask_title}
  子任务目标：{subtask_reason}

  当前结果：
  - 核心问题：{sub_query}
  - 证据：
  {evidence}
  - 候选答案：{candidates}
  - 置信度：{confidence}

  请以严格JSON格式输出（不要markdown code fence）：
  {{"passed": true, "reason": "判断理由", "rejected_candidates": [], "refined_queries": []}}

  评判标准：
  1) 逐一审查每个候选答案，判断它是否切题回答了子任务目标且有证据支撑
  2) 如果某个候选答案明显不切题、虚构、证据不支持，将其加入 rejected_candidates 数组（精确匹配原文）
  3) 只要剔除不合格候选后，还剩至少一个有效候选，则 passed=true
  4) 只有当所有候选全被剔除或 evidence 全部无关时，才 passed=false
  5) passed=false 时，refined_queries 必须提供 2~4 条更精准的搜索查询
  6) 多候选答案是正常的——保留所有有证据支撑的候选，只剔除明确错误的

initial_query_gen_prompt: |
  你是搜索查询生成专家。请为以下子任务生成两类搜索查询。

  原始问题：{question}
  当前子任务：[{subtask_id}] {subtask_title}
  子任务目标：{subtask_reason}

  ## 生成两类查询

  ### P类（Precision 高精度）：锚点实体 + 关系词，精准定位目标
  - 用子任务中最核心的实体名/人名/作品名作为锚点
  - 加上一个关系词（如"出生" "发行" "导演" "母公司"）
  - 每条 2~5 个词，极短精准
  - 生成 1~2 条

  ### R类（Recall 高召回）：弱化锚点，防止 P 类写错时完全没结果
  - 去掉限定条件，只保留最核心的实体名
  - 或用更宽泛的上位概念搜索
  - 每条 2~4 个词
  - 生成 1~2 条

  ## 铁律
  - 严格使用子任务标题中的原文措辞，绝不同义替换、缩写、改写
  - 每条查询只检索一个目标，绝不堆叠多跳信息
  - 覆盖中英双语

  输出格式（每行一条，P/R标签开头）：
  P: 锚点实体 关系词
  P: anchor entity relationship
  R: 核心实体
  R: core entity english

  只输出查询列表，不要其他内容。
