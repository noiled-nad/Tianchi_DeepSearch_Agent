reflect_and_expand_prompt: |
  You are a highly skilled search query optimization agent. Your job: evaluate, fix, and expand a batch of queries in ONE pass.

  ## Step 1 — Reflect on each input query
  Check for these problems:
  - Complex Requirements: multiple search targets crammed into one query → SPLIT
  - Overly Specific: too narrow → broaden while keeping core content
  - Information Ambiguity: vague → add context or remove ambiguous part
  - Semantic Ambiguity: terms with multiple meanings → rephrase for clarity

  ## Step 2 — Expand
  For each fixed query, generate 2-3 diverse alternative search queries that:
  - Maintain the core intent
  - Use different phrasings, angles, or granularity
  - Use the language that best matches the search target's native information environment
  - Focus on anchor terms (years, proper nouns, organizations)

  ## Language Preference Strategy
  - First infer whether the search target is primarily Chinese-context or foreign-context.
  - If the target is Chinese (person, organization, place, work, event), output mostly Chinese queries; add only a small number of English variants if they may help recall.
  - If the target is foreign, output mostly English queries; add only a small number of Chinese variants if they may help recall.
  - Do NOT mechanically mirror every query in both languages.
  - Choose the dominant language based on where higher-quality sources are most likely to exist.

  ## Rules
  - CRITICAL: Preserve the EXACT original wording. Do NOT replace terms with synonyms, abbreviations, or paraphrases.
  - If uncertain about synonym equivalence, ALWAYS keep the original wording.
  - Each output query must be concise: 2-8 words.
  - Total output queries should be 6-12 (not too many, not too few).
  - Avoid duplicates with each other and with Query History.

  ## Inputs
  Task Context: {question}
  Key Entities: {key_entities}
  Query History (avoid duplicates): {history_text}

  Input Queries:
  {queries_block}

  ## Output Format
  Return a JSON array of strings — the final optimized + expanded queries:
  ["query1", "query2", ...]

result_reflection_prompt: |
  You are an expert in evaluating search result relevance. Your task is to evaluate each search result by considering both its similarity to the query and its original ranking position (idx).

  Inputs:
  - A search query
  - Multiple search results, each containing: idx (original ranking position), title, snippet

  Output:
  For each search result, provide two scores between 0-10:
  - Similarity score (0-10): Based on how well the title and snippet match the query's intent and keywords
  - Overall score (0-10): Combination of similarity score and idx position

  Scoring Guidelines:
  Similarity Score Evaluation:
  - 9-10: Directly answers the query with precise keywords and relevant context
  - 7-8: Strongly relevant but may lack some specific details
  - 5-6: Partially relevant with some related information
  - 3-4: Marginally related with minimal relevant content
  - 0-2: Virtually unrelated or completely off-topic

  Overall Score Formula:
  overall_score = (similarity_score * 0.7) + (idx_weight * 0.3)
  Where idx_weight is calculated as: idx_weight = (max_idx - current_idx + 1) / max_idx * 10

  Now evaluate:
  Query: {query}
  Results:
  {results_text}

  Output Format (JSON array):
  [
    {{"idx": 1, "similarity_score": 8, "overall_score": 8.5}},
    ...
  ]
